apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: tabletop
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: matches
  namespace: tabletop
spec:
