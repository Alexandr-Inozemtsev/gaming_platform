apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tabletop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/tabletop-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: tabletop-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matches
  namespace: tabletop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matches
  template:
    metadata:
      labels:
        app: matches
    spec:
      containers:
        - name: matches
          image: ghcr.io/example/tabletop-matches:latest
          ports:
            - containerPort: 3101
          env:
            - name: API_PORT
              value: "3101"
          envFrom:
            - configMapRef:
                name: tabletop-config
---
