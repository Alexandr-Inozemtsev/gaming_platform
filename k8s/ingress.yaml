apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tabletop-ingress
  namespace: tabletop
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.tabletop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
    - host: ws.tabletop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: websocket
                port:
                  number: 80
