# Этот workflow задаёт базовый CI для MVP-монорепозитория.
# Роль файла: автоматизировать контроль качества backend и мобильного клиента в pull request/push.
# Основные функции: запуск lint, unit/integration/load-тестов для сервисов, а также flutter test/analyze для mobile-приложения.
# Связи: использует npm-скрипты из package.json и структуру apps/mobile, services/*.
# Важно при изменении: сохранять быстрый фидбек и падение пайплайна при ошибках качества.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS files
        run: git lfs checkout

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Guard mobile runtime manifest sync
        run: npm run check:mobile-runtime-manifest-sync


      - name: Unit tests
        run: npm test

      - name: Load test (synthetic WS)
        env:
          TARGET_WS_CONN: 200
          TARGET_MOVE_RPS: 20
          LOAD_TEST_DURATION_SEC: 3
        run: npm run test:load:ws

      - name: Build P2 container targets
        run: |
          docker build -f infra/Dockerfile --target api -t tabletop-api:ci .
          docker build -f infra/Dockerfile --target matches -t tabletop-matches:ci .
          docker build -f infra/Dockerfile --target campaigns -t tabletop-campaigns:ci .
          docker build -f infra/Dockerfile --target analytics -t tabletop-analytics:ci .
          docker build -f infra/Dockerfile --target web-socket -t tabletop-websocket:ci .

      - name: Validate Kubernetes manifests
        run: kubectl apply --dry-run=client -f k8s/

      - name: Load test script syntax
        run: node tests/load.js

      - name: Security scan (npm audit)
        run: npm audit --audit-level=high

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repository-files
          path: |
            .gitattributes
            .gitignore

  mobile:
    name: Flutter analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS files
        run: git lfs checkout

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/mobile
        run: flutter analyze

      - name: Flutter e2e smoke (widget)
        working-directory: apps/mobile
        run: flutter test test/smoke_test.dart

      - name: Materialize Big Walker golden PNG baselines
        working-directory: apps/mobile
        run: python test/golden/goldens/materialize_big_walker_goldens.py

      - name: Big Walker golden baseline manifest and files
        working-directory: apps/mobile
        run: flutter test test/golden/big_walker_baseline_files_test.dart

      - name: Big Walker golden states
        working-directory: apps/mobile
        run: flutter test test/golden/big_walker_states_golden_test.dart
