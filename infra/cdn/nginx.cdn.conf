# Placeholder CDN/edge config for MVP deploy.
# In production, terminate TLS on LB/CDN and forward to this ingress.

upstream api_upstream {
  server api:3000;
}

upstream realtime_upstream {
  server realtime:3001;
}

upstream admin_upstream {
  server admin:3002;
}

upstream rules_upstream {
  server rules-engine:3003;
}

server {
  listen 80;
  server_name _;

  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options DENY;
  add_header Referrer-Policy no-referrer;

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://api_upstream;
  }

  location /realtime/ {
    rewrite ^/realtime/(.*)$ /$1 break;
    proxy_pass http://realtime_upstream;
  }

  location /admin/ {
    rewrite ^/admin/(.*)$ /$1 break;
    proxy_pass http://admin_upstream;
  }

  location /rules/ {
    rewrite ^/rules/(.*)$ /$1 break;
    proxy_pass http://rules_upstream;
  }

  location /health {
    return 200 'ok';
  }
}
