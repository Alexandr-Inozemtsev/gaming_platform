name: tabletopplatform_mobile
description: MVP mobile app shell for tabletop platform
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.11
  in_app_purchase: ^3.2.0
  flutter_webrtc: ^0.12.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/design/
    - assets/design/big_walker_reference/
